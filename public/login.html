<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VetCore Estoque</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1117;color:#f7f7f7;font-family:Arial, sans-serif;margin:0;padding:20px}
    .loginBox{width:min(420px,100%);background:#171a23;border:1px solid #272b38;border-radius:20px;padding:28px;box-shadow:0 20px 60px #0008}
    .loginBrand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.loginBrand .logo{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:#00b894;color:white;font-weight:800}.loginBrand h1{font-size:22px;margin:0}.loginBrand p{margin:2px 0 0;color:#aab}
    .loginBox label{display:block;margin:14px 0 8px;color:#dfe}.loginBox input{box-sizing:border-box;width:100%;padding:13px;border-radius:12px;border:1px solid #333847;background:#10131b;color:white}.loginBox button{width:100%;margin-top:18px;padding:13px;border:0;border-radius:12px;background:#00b894;color:white;font-weight:700;cursor:pointer}.erro{background:#3a1616;border:1px solid #7d2a2a;color:#ffd0d0;border-radius:10px;padding:10px;margin:10px 0;display:none}.hint{font-size:12px;color:#99a;margin-top:14px;line-height:1.4}
  </style>
</head>
<body>
  <form class="loginBox" method="POST" action="/login">
    <div class="loginBrand"><div class="logo">VC</div><div><h1>VetCore</h1><p>Estoque & Cotação</p></div></div>
    <div id="erro" class="erro">Usuário ou senha incorretos.</div>
    <label>Usuário</label><input name="usuario" autocomplete="username" required autofocus>
    <label>Senha</label><input name="senha" type="password" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
    <p class="hint">Primeiro acesso padrão: usuário <b>admin</b> e senha <b>123456</b>. Troque no arquivo <b>users.json</b> ou criando outro hash conforme o LEIA-ME.</p>
  </form>
<script>if(new URLSearchParams(location.search).get('erro'))document.getElementById('erro').style.display='block';</script>
</body>
</html>
