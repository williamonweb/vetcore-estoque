
<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VetCore Estoque - Login</title><link rel="stylesheet" href="/style.css"></head>
<body><main><div class="card login"><h1>VetCore Estoque</h1><p class="muted">Entre para acessar o sistema.</p><input id="username" placeholder="Usuário" value="admin"><input id="password" type="password" placeholder="Senha" value="123456"><button onclick="login()">Entrar</button><p id="msg" class="bad"></p></div></main>
<script>
async function login(){const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});const j=await r.json();if(!r.ok){msg.textContent=j.error||'Erro';return} location.href=j.user.role==='fornecedor'?'/fornecedor.html':'/admin.html'}
</script></body></html>
